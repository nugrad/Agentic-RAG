version: "3.9"

services:
  agentic-rag:
    build: .
    container_name: agentic-rag-api
    ports:
      - "8000:8000"        # host:container
    env_file:
      - .env               # injects GEMINI_API_KEY and GROQ_API_KEY
    volumes:
      # Mount data directory so ChromaDB and chunks persist
      # outside the container — survives rebuilds
      - ./data:/app/data
    restart: unless-stopped